services:
  mongodb:
    image: mongo:latest
    container_name: flora_mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./instruction-be
    container_name: flora_backend
    restart: always
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-flora_db}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - AUDIO_STORAGE_PATH=/app/static/audio
    volumes:
      - flora_audio:/app/static/audio
    depends_on:
      - mongodb
    ports:
      - "8000:8000"

  frontend:
    build: ./instruction-fe
    container_name: flora_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"

volumes:
  mongo_data:
  flora_audio:
